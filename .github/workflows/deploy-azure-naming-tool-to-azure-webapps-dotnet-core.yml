# This workflow will build and push a .NET Core app to an Azure Web App when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure App Service web app.
# For instructions see https://docs.microsoft.com/en-us/azure/app-service/quickstart-dotnetcore?tabs=net60&pivots=development-environment-vscode
#
# To configure this workflow:
#
# 1. Create a federated identity credential on an Azure AD app registration or managed identity.
#    For instructions see: https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure
#
# 2. Create the following secrets in your repository:
#    - AZURE_WEBAPP_NAME: the name of your Azure App Service
#    - AZURE_CLIENT_ID: the client ID of your Azure AD app registration / managed identity
#    - AZURE_TENANT_ID: your Azure tenant ID
#    - AZURE_SUBSCRIPTION_ID: your Azure subscription ID
#
# For more information on GitHub Actions for Azure: https://github.com/Azure/Actions
# For more information on the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples

name: Azure Naming Tool - Build and deploy to an Azure Web App

env:
  AZURE_WEBAPP_PACKAGE_PATH: '.'      # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x'                 # set this to the .NET Core version to use

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
defaults:
  run:
    working-directory: src
    
permissions:
  contents: read
                
jobs:
  check-secrets:
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: src    
      outputs:
        secrets-valid: ${{ steps.secrets-valid.outputs.isvalid }}
      steps:
        - uses: actions/checkout@v3      
        - id: secrets-valid
          env: 
            azure-webapp-name: ${{ secrets.AZURE_WEBAPP_NAME }}
            azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
            azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
            azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          if: (env.azure-webapp-name != null && env.azure-client-id != null && env.azure-tenant-id != null && env.azure-subscription-id != null)
          run: echo 'isvalid=true' >> $GITHUB_OUTPUT
            
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src    
    needs: [check-secrets]
    if: needs.check-secrets.outputs.secrets-valid == 'true'
    steps:
      - uses: actions/checkout@v3
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Set up dependency caching for faster builds
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4.4.3
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy: 
    defaults:
      run:
        working-directory: ready/AzNamingTool 
    permissions:
      contents: none
      id-token: write
    runs-on: ubuntu-latest
    needs: [build,check-secrets]
    if: needs.check-secrets.outputs.secrets-valid == 'true'
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4.1.8
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
